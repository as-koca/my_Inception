name: inception

services:
  mariadb:
    image: mariadb:1.0
    restart: always
    build: ./requirements/mariadb
    volumes:
      - /home/akoca/data/mariadb:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception
    secrets:
      - db_password
      - db_root_password
  wordpress:
    image: wordpress:1.0
    restart: always
    depends_on:
      - mariadb
    build: ./requirements/wordpress
    volumes:
      - /home/akoca/data/wordpress:/var/www/html
    env_file:
      - .env
    networks:
      - inception
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
  nginx:
    image: nginx:1.0
    restart: always
    depends_on:
      - wordpress
    build: ./requirements/nginx
    ports:
      - "443:443"
    volumes:
      - /home/akoca/data/wordpress:/var/www/html
    networks:
      - inception

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

networks:
  inception:
    driver: bridge
