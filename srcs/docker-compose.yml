name: inception

services:
  mariadb:
    build: ./requirements/mariadb
    volumes: - /home/akoca/data/mariadb:/var/lib/mysql/mysql
    env_file: - .env
    networks: inception
  wordpress:
    build: ./requirements/wordpress
    volumes: - /home/akoca/data/wordpress:/var/www/html
    env_file: - .env
    networks: inception
   nginx:
    build: ./requirements/nginx
    networks: inception
   secrets:
     - db_password
     - db_root_password
     - wp_admin_password
     - wp_user_password

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

networks:
  inception:
    driver: bridge
