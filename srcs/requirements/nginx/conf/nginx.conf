events {}
#nginx requires an events block.

http
{
	server
	{
		listen 443 ssl;   #1
		server_name akoca.42.fr; #2

		ssl_certificate /etc/nginx/ssl/nginx.crt;      #3
		ssl_certificate_key /etc/nginx/ssl/nginx.key;
		ssl_protocols TLSv1.2 TLSv1.3;

		root /var/www/html; #4
		index index.php;

		location / #***
		{
			try_files $uri $uri/ /index.php?$args;
		}

		location ~ \.php$ #5
		{
			include fastcgi_params;
			fastcgi_pass wordpress:9000;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		}
	}
}
# 'location' must be matched to smth (like up ther -> '\' anything, '~ \.php' anything ending in .php.

# 1) Accepts connections on port 443 through HTTPS connections with 'listen' in 'server' in 'http'.

# 2) Domain name is akoca.42.fr

# 3) Get the certificate and its key from their files, and use the TLSv1.2 1.3 protocol
# the protocol is used to encrypt communication between app and server. Security.

# 4) /var/www/html is where the wp volumes are at.
# If user visits https://akoca.42.fr/ nginx looks for "/var/ww.../index.php.

# 5) "location ~ \.php" for every file ending with '.php' -> include FastCGI defaults, commands to use.
#  Send php to wp container through 9000 (works since wordpress was named like that in docker compose)
#  
#  `fastcgi_param NAME value;` sets a variable that gets sent to php-fpm as part of the FastCGI request. php-fpm reads these to understand the request.
#  `SCRIPT_FILENAME` — the specific variable php-fpm reads to know the full path of the PHP file to run. #  `$document_root` — expands to your root, i.e. /var/www/html.
#  `$fastcgi_script_name` — expands to the script part of the request, e.g. /index.php.
#   
#   Concatenated: $document_root$fastcgi_script_name → /var/www/html/index.php.
#   That absolute path is what php-fpm opens and executes.

# ***) $uri - the requested path as a file. 
#      If someone asks for /style.css, nginx checks whether /var/www/html/style.css exists on disk. 
#      If yes, serve it directly, done.
#      $uri/ - the requested path as a directory.
#      /index.php?$args - the fallback, if neither of theabove exists.
#      ‘args` is the query string (everything after ? in the URL).
#      So this rewrites the request to go through WordPress's main file, index.php, preserving the original query parameters.
#
#      WordPress uses "pretty permalinks." A URL like /about-me/ is not a real file or folder on disk; there's no /var/www/html/about-me/ directory.
#      It's a virtual route that only exists inside WordPress's logic. 
#      So when a visitor requests /about-me/, the first two checks (`uri‘,‘uri`, `uri‘,‘uri/`) both fail — nothing on disk matches — and the request falls through to /index.php?$args.
#      WordPress's index.php (its front controller) then looks at the original path, figures out "ah, they want the about-me page," and generates it.
#      Without this fallback, every permalink that isn't a literal file would 404.
#      That's why it falls back to index.php instead of returning an error: real files are served as-is, everything else is handed to WordPress to interpret.
